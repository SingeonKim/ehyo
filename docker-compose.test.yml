# CI용 compose. 프로덕션 빌드된 web 위에서 Playwright E2E를 수행한다.
# 로컬에서는 `docker compose -f docker-compose.test.yml up --exit-code-from playwright` 로 실행.

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: runner
    container_name: my-music-app-web-test
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      # alpine runner 이미지에 wget/curl 미포함 보장 안 됨.
      # node는 CMD로 사용 중이니 항상 있음 → node 내장 http로 헬스체크.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  playwright:
    # Playwright npm 패키지 버전(apps/web/package.json)과 맞춰야 브라우저 바이너리
    # 경로 불일치로 "Executable doesn't exist at /ms-playwright/..." 에러 방지.
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    container_name: my-music-app-playwright
    depends_on:
      web:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      CI: "true"
      BASE_URL: http://web:3000
    command: >
      sh -c "npm install -g pnpm@9.12.3 &&
             pnpm install --frozen-lockfile &&
             cd apps/web &&
             pnpm exec playwright test"
