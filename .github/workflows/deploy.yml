# Railway 배포 워크플로
#
# 셋업:
#   1. Railway 대시보드 → New Project → Deploy from GitHub repo (이 저장소 선택)
#   2. 서비스 생성 후 Settings → Tokens → 토큰 발급
#   3. GitHub repo Settings → Secrets and variables → Actions
#      - Secret  RAILWAY_TOKEN          (필수)
#      - Variable RAILWAY_SERVICE_NAME  (선택, 기본 'web')
#   4. railway.toml의 dockerfilePath / healthcheckPath가 Railway 빌드 설정과 일치하는지 확인
#
# Railway가 GitHub repo와 직접 연동(자동 배포)하는 native integration을 쓰면 이
# 워크플로는 불필요하다. 둘 중 하나만 활성화 — 두 경로가 동시에 돌면 큐가 충돌한다.
# 이 워크플로는 CI 통과 후 deploy까지 한 파이프라인에서 묶고 싶을 때 사용.

name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  railway:
    name: railway up
    runs-on: ubuntu-latest
    # workflow_dispatch는 무조건 실행, workflow_run은 CI가 success일 때만.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy
        env:
          # 외부 입력이 아닌 secrets/vars지만 best practice에 따라 env로 분리.
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME || 'web' }}
        run: |
          railway up --service "$SERVICE_NAME" --detach
