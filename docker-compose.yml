# 개발용 compose. `docker compose up`로 핫 리로드되는 Next.js dev 서버 기동.
# monorepo: context는 루트, Dockerfile 내부에서 apps/web workdir로 전환.
# Phase 5부터 api, postgres, minio 서비스 추가 예정.

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: dev
    container_name: my-music-app-web
    environment:
      NODE_ENV: development
      # WSL/Docker에서 파일 변경 감지 안 되는 경우가 있어 폴링 강제
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      # 루트 전체를 bind-mount. Dockerfile의 WORKDIR이 apps/web/이어도 루트 참조 가능.
      - ./:/app
      # anonymous volumes로 컨테이너 내부 node_modules와 .next 격리 (호스트와 분리)
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    stdin_open: true
    tty: true
